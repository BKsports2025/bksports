<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BKsports | Resmi Web Sitesi</title>
    <style>
        body { 
            background-color: #0b0b0b; /* Koyu siyah havalı arka plan */
            color: #00d2ff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px;
            text-align: center;
        }
        header { margin-bottom: 40px; border-bottom: 2px solid #1a1a1a; padding: 20px; }
        h1 { letter-spacing: 5px; text-transform: uppercase; color: #fff; }
        
        .container { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto;
        }
        
        .product-card { 
            background: #151515; 
            border: 1px solid #00d2ff; 
            padding: 15px; 
            border-radius: 15px; 
            width: 250px; /* Kutuların genişliği sabitlendi */
            transition: 0.3s;
        }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 0 20px #00d2ff; }
        
        .product-card img { 
            width: 100%; 
            height: 250px; 
            object-fit: cover; /* Resimleri kutuya sığdırır, taşırmaz */
            border-radius: 10px; 
            margin-bottom: 10px;
        }
        
        .tag { background: #00d2ff; color: #000; padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 12px; }
        h3 { color: #fff; margin: 15px 0; }
        .buy-button { background: none; border: 1px solid #00d2ff; color: #00d2ff; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>BKSPORTS EST 2025</h1>
        <p>Geleceğin Spor Giyim Markası | Tüm Koleksiyon</p>
    </header>

    <div class="container">

        <div class="product-card"><img src="hoodie5.jpeg"><div class="tag">YENİ</div><h3>BKsports V5</h3><button class="buy-button">İncele</button></div>
        <div class="product-card"><img src="hoodie6.jpeg"><div class="tag">YENİ</div><h3>BKsports V6</h3><button class="buy-button">İncele</button></div>

        <div class="product-card"><img src="hoodie8.jpeg"><div class="tag">YENİ</div><h3>BKsports V8</h3><button class="buy-button">İncele</button></div>
        <div class="product-card"><img src="hoodie9.jpeg"><div class="tag">YENİ</div><h3>BKsports V9</h3><button class="buy-button">İncele</button></div>
        <div class="product-card"><img src="hoodie10.jpeg"><div class="tag">YENİ</div><h3>BKsports V10</h3><button class="buy-button">İncele</button></div>
